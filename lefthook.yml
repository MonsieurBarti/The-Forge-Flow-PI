pre-commit:
  parallel: true
  commands:
    lint:
      glob: "*.{ts,tsx,js,jsx,json}"
      run: ./node_modules/.bin/biome check --no-errors-on-unmatched {staged_files}
      stage_fixed: true
    typecheck:
      run: ./node_modules/.bin/tsc --noEmit

commit-msg:
  commands:
    commitlint:
      run: ./node_modules/.bin/commitlint --edit {1}

pre-push:
  parallel: true
  commands:
    test:
      run: ./node_modules/.bin/vitest run
