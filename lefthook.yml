pre-commit:
  parallel: true
  commands:
    lint:
      glob: "*.{ts,tsx,js,jsx,json}"
      run: npx @biomejs/biome check --no-errors-on-unmatched {staged_files}
      stage_fixed: true
    typecheck:
      run: npx tsc --noEmit

pre-push:
  parallel: true
  commands:
    test:
      run: npx vitest run
